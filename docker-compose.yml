services:
  dind:
    image: docker:27-dind
    privileged: true
    environment:
      - DOCKER_TLS_CERTDIR=
    volumes:
      - dind-data:/var/lib/docker
      - ./mcps:/workspace
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "sh", "-c", "docker info >/dev/null 2>&1"]
      interval: 3s
      timeout: 2s
      retries: 20
    command: |
      dockerd-entrypoint.sh --registry-mirror=https://lispy.org

  init:
    image: docker:27-cli
    depends_on:
      dind:
        condition: service_healthy
    environment:
      - DOCKER_HOST=tcp://dind:2375
    volumes:
      - ./mcps:/workspace
    working_dir: /workspace
    command: >
      sh -lc '
        if ! docker compose version >/dev/null 2>&1; then
          apk add --no-cache docker-cli-compose || true;
        fi;
        docker compose up -d --build;
        tail -f /dev/null
      '

volumes:
  dind-data: