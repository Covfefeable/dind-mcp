services:
  firecrawl-mcp:
    build: ./firecrawl
    environment:
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY}
      - SSE_LOCAL=${FIRECRAWL_SSE_LOCAL}
    restart: always

  proxy:
    build: ./nginx
    depends_on:
      - firecrawl-mcp
    ports:
      - "8080:8080"       # 映射到 dind 容器的 8080（外层再映射到宿主机）
    restart: always