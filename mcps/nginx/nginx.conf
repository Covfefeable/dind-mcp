worker_processes auto;
events { worker_connections 1024; }

http {
  access_log /dev/stdout;
  error_log  /dev/stderr info;

  proxy_http_version 1.1;
  proxy_buffering off;
  proxy_read_timeout 1h;
  proxy_send_timeout 1h;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  map $http_cookie $service_type {
    default "";
    "~*service-type=firecrawl" "firecrawl";
    "~*service-type=12306" "12306";
  }

  map $service_type $backend_server {
    default "http://mcp-12306:3000";
    "firecrawl" "http://firecrawl-mcp:3000";
    "12306" "http://mcp-12306:3000";
  }

  server {
    listen 8080;
    
    # Enable request body logging
    client_body_buffer_size 32k;
    client_max_body_size 32m;

    location = /_ok {
      return 200 'ok';
      add_header Content-Type text/plain;
    }

    location /firecrawl/ {
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      add_header Set-Cookie "service-type=firecrawl; Path=/" always;
      proxy_pass http://firecrawl-mcp:3000/;
    }

    # 12306 root endpoint - generic fallback
    location /12306/ {
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      add_header Set-Cookie "service-type=12306; Path=/" always;
      proxy_pass http://mcp-12306:3000/;
    }

    location /messages {
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-Host $server_name;
      proxy_pass_request_headers on;
      proxy_pass_request_body on;
      proxy_pass $backend_server/messages$is_args$args;
    }

    location /message {
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-Host $server_name;
      proxy_pass_request_headers on;
      proxy_pass_request_body on;
      proxy_pass $backend_server/message$is_args$args;
    }
  }
}